{% extends 'users/base.html' %} {% block content %}
<div class="container">
  <h1>Users</h1>
  <table class="table table-bordered table-striped">
    <tr>
      <th>id</th>
      <th>name</th>
      <th>age</th>
    </tr>
    {% for user in users %}
    <tr>
      <td>{{user.user_id}}</td>
      <td>{{user.name}}</td>
      <td>{{user.age}}</td>
      <td>
        <a
          href="{% url 'delete_user' user.user_id %}"
          class="btn btn-danger btn-sm"
          >🗑️ Deletar</a
        >
      </td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
