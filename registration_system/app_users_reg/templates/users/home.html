{% extends 'users/base.html' %}
{% block content %}

<div class="container mt-5">
  <div class="card shadow-lg">
    <div class="card-header bg-primary text-white text-center">
      <h2>📝 Cadastro de Usuário</h2>
    </div>
    <div class="card-body">
      <form action="{% url 'users_list' %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- Informações Pessoais -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Nome Completo *</label>
            <input name="name" class="form-control" type="text" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email *</label>
            <input name="email" class="form-control" type="email" required />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Telefone</label>
            <input name="phone" class="form-control" type="text" placeholder="(00) 00000-0000" />
          </div>
          <div class="col-md-4">
            <label class="form-label">CPF *</label>
            <input name="cpf" class="form-control" type="text" placeholder="000.000.000-00" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Data de Nascimento *</label>
            <input name="birth_date" class="form-control" type="date" required />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Gênero</label>
            <select name="gender" class="form-select">
              <option value="">Selecione...</option>
              <option value="M">Masculino</option>
              <option value="F">Feminino</option>
              <option value="O">Outro</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Status</label>
            <select name="status" class="form-select">
              <option value="A" selected>Ativo</option>
              <option value="I">Inativo</option>
            </select>
          </div>
        </div>

        <!-- Endereço -->
        <h5 class="mt-4 mb-3 text-primary">📍 Endereço</h5>
        <div class="row mb-3">
          <div class="col-md-8">
            <label class="form-label">Rua</label>
            <input name="street" class="form-control" type="text" />
          </div>
          <div class="col-md-4">
            <label class="form-label">CEP</label>
            <input name="zipcode" class="form-control" type="text" placeholder="00000-000" />
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-8">
            <label class="form-label">Cidade</label>
            <input name="city" class="form-control" type="text" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Estado</label>
            <select name="state" class="form-select">
              <option value="">UF</option>
              <option value="AC">AC</option>
              <option value="AL">AL</option>
              <option value="AP">AP</option>
              <option value="AM">AM</option>
              <option value="BA">BA</option>
              <option value="CE">CE</option>
              <option value="DF">DF</option>
              <option value="ES">ES</option>
              <option value="GO">GO</option>
              <option value="MA">MA</option>
              <option value="MT">MT</option>
              <option value="MS">MS</option>
              <option value="MG">MG</option>
              <option value="PA">PA</option>
              <option value="PB">PB</option>
              <option value="PR">PR</option>
              <option value="PE">PE</option>
              <option value="PI">PI</option>
              <option value="RJ">RJ</option>
              <option value="RN">RN</option>
              <option value="RS">RS</option>
              <option value="RO">RO</option>
              <option value="RR">RR</option>
              <option value="SC">SC</option>
              <option value="SP">SP</option>
              <option value="SE">SE</option>
              <option value="TO">TO</option>
            </select>
          </div>
        </div>

        <!-- Foto de Perfil -->
        <div class="mb-4">
          <label class="form-label">📸 Foto de Perfil</label>
          <input name="profile_photo" class="form-control" type="file" accept="image/*" />
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-lg px-5">
            💾 Cadastrar Usuário
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
